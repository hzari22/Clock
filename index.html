<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Clock</title>
  </head>
  <body>
    <div class="div-time">
      <h1 class="time">00:00:00</h1>
    </div>

    <div class="clock">
      <div class="clock-face">
        <div class="hand hour-hand"></div>
        <div class="hand min-hand"></div>
        <div class="hand second-hand"></div>
        <div class="circle"></div>
      </div>
    </div>

    <style>
      html {
        background: #018ded url("https://unsplash.it/1500/1000?image=881&blur=5");
        background-size: cover;
        font-family: "helvetica neue";
        text-align: center;
        font-size: 10px;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: space-around;
        gap: 6rem;
        padding: 4rem;
        box-sizing: border-box;
        font-size: 2rem;
      }

      .div-time {
        color: white;
        min-width: 28rem;
        text-align: left;
        text-shadow: 0 3px 12px rgba(0, 0, 0, 0.45);
      }

      .time {
        margin: 0;
        font-size: clamp(4rem, 8vw, 9rem);
        line-height: 1;
      }

      .clock {
        width: 30rem;
        height: 30rem;
        border: 20px solid white;
        border-radius: 50%;
        position: relative;
        padding: 2rem;
        flex: 0 0 auto;
        box-shadow:
          0 0 0 4px rgba(0, 0, 0, 0.1),
          inset 0 0 0 3px #efefef,
          inset 0 0 10px black,
          0 0 10px rgba(0, 0, 0, 0.2);
      }

      .clock-face {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .hand {
        width: 50%;
        height: 6px;
        background: black;
        position: absolute;
        top: 50%;
        left: 0;
        transform-origin: 100% 50%;
        transform: translateY(-50%) rotate(90deg);
        transition: all 0.05s;
        transition-timing-function: cubic-bezier(0.1, 2.7, 0.58, 1);
      }

      .circle {
        width: 14px;
        height: 14px;
        background: black;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3;
      }

      .hour-hand {
        width: 35%;
        left: 15%;
        height: 8px;
      }

      .second-hand {
        height: 3px;
        background: rgb(134, 39, 2);
        z-index: 1;
      }

      @media (max-width: 760px) {
        body {
          flex-direction: column;
          justify-content: center;
          gap: 4rem;
        }

        .div-time {
          min-width: 0;
          text-align: center;
        }
      }
    </style>

    <script>
      const secondHand = document.querySelector(".second-hand");
      const minsHand = document.querySelector(".min-hand");
      const hourHand = document.querySelector(".hour-hand");
      const timeDisplay = document.querySelector(".time");

      function setDate() {
        const now = new Date();

        const seconds = now.getSeconds();
        const secondsDegrees = (seconds / 60) * 360 + 90;
        secondHand.style.transform = `translateY(-50%) rotate(${secondsDegrees}deg)`;

        const mins = now.getMinutes();
        const minsDegrees = (mins / 60) * 360 + (seconds / 60) * 6 + 90;
        minsHand.style.transform = `translateY(-50%) rotate(${minsDegrees}deg)`;

        const hour = now.getHours() % 12;
        const hourDegrees = (hour / 12) * 360 + (mins / 60) * 30 + 90;
        hourHand.style.transform = `translateY(-50%) rotate(${hourDegrees}deg)`;

        timeDisplay.textContent = now.toLocaleTimeString("de-DE", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });

        if (seconds === 0) {
          secondHand.style.transition = "none";
        } else {
          secondHand.style.transition = "all 0.05s";
        }
      }

      setInterval(setDate, 1000);

      setDate();
    </script>
  </body>
</html>
